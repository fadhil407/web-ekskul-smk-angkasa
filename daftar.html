<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Ekskul - SMK Angkasa</title>  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

    body{
      min-height:100vh;
      background:linear-gradient(120deg,#1e3c72,#2a5298);
      display:flex;
      justify-content:center;
      align-items:center;
      color:#fff;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,.1);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,.2);
      border-radius:16px;
      padding:25px;
      box-shadow:0 10px 25px rgba(0,0,0,.3);
    }

    h2{
      text-align:center;
      margin-bottom:15px;
    }

    p{
      text-align:center;
      font-size:13px;
      opacity:.8;
      margin-bottom:15px;
    }

    label{
      display:block;
      margin-top:10px;
      font-size:13px;
    }

    input,select{
      width:100%;
      padding:10px;
      margin-top:5px;
      border-radius:8px;
      border:none;
      outline:none;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      background:linear-gradient(135deg,#4facfe,#00c6ff);
      color:#fff;
      font-weight:bold;
      cursor:pointer;
      transition:.3s;
    }

    button:hover{
      transform:scale(1.05);
      box-shadow:0 5px 15px rgba(0,0,0,.3);
    }

    .back{
      text-align:center;
      margin-top:15px;
    }

    .back a{
      color:#fff;
      font-size:13px;
      text-decoration:none;
      opacity:.8;
    }

    .back a:hover{
      text-decoration:underline;
    }

    .note{
      text-align:center;
      font-size:11px;
      margin-top:10px;
      opacity:.6;
    }

  </style></head>
<body>  <div class="card">
    <h2>Daftar Ekskul 📝</h2>
    <p>Isi data dengan benar</p><form action="status.html">

  <label>Nama Lengkap</label>
  <input type="text" placeholder="Masukkan nama" required>

  <label>Kelas</label>
  <input type="text" placeholder="Masukan Kelas" required>

  <label>Pilih Ekskul</label>
  <select required>
    <option value="">-- Pilih --</option>
    <option>Futsal</option>
    <option>Basket</option>
    <option>Pramuka</option>
    <option>Paskibra</option>
    <option>PMR</option>
    <option>Seni</option>
  </select>

  <label>No HP</label>
  <input type="number" placeholder="08xxxxxxxxxx" required>

  <button type="submit">Kirim Pendaftaran</button>

</form>

<div class="back">
  <a href="home.html">← Kembali ke Home</a>
</div>
</body>
</html>
