<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pendaftaran Berhasil - SMK Angkasa</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(120deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeIn 0.8s ease;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    p {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .success {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .btn {
      display: block;
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      background: linear-gradient(135deg, #4facfe, #00c6ff);
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .back {
      margin-top: 10px;
      font-size: 13px;
    }

    .back a {
      color: white;
      text-decoration: none;
      opacity: 0.8;
    }

    .back a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>
<body>

  <div class="card">
    <div class="success">🎉</div>
    <h2>Pendaftaran Berhasil</h2>

    <p>Kamu sudah resmi terdaftar pada ekstrakurikuler pilihanmu.</p>
    <p>Silakan tunggu informasi selanjutnya mengenai jadwal dan kegiatan.</p>

    <a href="home.html" class="btn">Kembali ke Beranda</a>

    <div class="back">
      <a href="daftar.html">← Daftar Lagi</a>
    </div>
  </div>

</body>
</html>
